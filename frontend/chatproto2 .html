<!DOCTYPE html>
<html>
<head>
  <title>Reality Check - Room</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .room { width: 600px; max-width: 100%; background: #2d2d2d; border-radius: 16px; border: 1px solid #444; overflow: hidden; color: #eee; }
    .header { padding: 16px; border-bottom: 1px solid #444; background: #222; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-weight: bold; display: flex; align-items: center; gap: 12px; }
    .header-title span { color: #888; font-weight: normal; }
    .logout-btn { background: #c62828; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .chat { padding: 16px; height: 300px; overflow-y: auto; border-bottom: 1px solid #444; display: flex; flex-direction: column; gap: 4px; }
    .chat p { margin: 2px 0; font-size: 14px; }
    .chat .username { font-weight: bold; }
    .chat .user-a { color: #6ecbf5; }
    .chat .user-b { color: #f5a86e; }
    .chat .user-c { color: #a8f56e; }
    .chat .me { color: #f5f56e; }
    .chat .timestamp { color: #666; font-size: 11px; margin-left: 8px; }
    .image-area { padding: 20px; text-align: center; border-bottom: 1px solid #444; }
    .image-box { width: 100%; max-width: 320px; height: 200px; margin: 0 auto; background: #1a1a1a; border-radius: 12px; border: 2px dashed #555; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px; flex-direction: column; gap: 8px; }
    .image-box img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }
    .vote-area { padding: 16px; border-bottom: 1px solid #444; }
    .vote-area p { margin: 0 0 12px 0; font-size: 14px; }
    .buttons { display: flex; gap: 12px; justify-content: center; }
    .btn-vote { padding: 10px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-real { background: #2e7d32; color: white; }
    .btn-real:hover { background: #1b5e20; }
    .btn-unsure { background: #f9a825; color: #1a1a1a; }
    .btn-unsure:hover { background: #f57f17; }
    .btn-fake { background: #c62828; color: white; }
    .btn-fake:hover { background: #b71c1c; }
    .vote-status { text-align: center; margin-top: 8px; font-size: 13px; color: #888; }
    .input-bar { padding: 12px 16px; display: flex; gap: 10px; background: #222; }
    .input-bar input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #333; color: #eee; outline: none; }
    .input-bar button { padding: 10px 20px; border: none; border-radius: 8px; background: #4a90d9; color: white; cursor: pointer; }
    .input-bar button:hover { background: #357abd; }
    .online-count { font-size: 12px; color: #888; }
  </style>
</head>
<body>

<div class="room">
  <div class="header">
    <div class="header-title">
      <span>◀</span> #REALITY_CHECK_ROOM <span>(<span id="playerCount">4</span> Players)</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  
  <div class="chat" id="chatContainer">
    <p style="color:#666; text-align:center; font-size:12px;">Welcome to Reality Check! Chat and vote below.</p>
  </div>
  
  <div class="image-area">
    <div class="image-box" id="imageBox">
      <span>📷</span>
      <span style="font-size:12px; color:#555;">Current image will appear here</span>
    </div>
  </div>
  
  <div class="vote-area">
    <p>❗ Is it real? Cast your vote:</p>
    <div class="buttons">
      <button class="btn-vote btn-real" onclick="castVote('REAL')">REAL</button>
      <button class="btn-vote btn-unsure" onclick="castVote('NOT SURE')">NOT SURE</button>
      <button class="btn-vote btn-fake" onclick="castVote('FAKE')">FAKE</button>
    </div>
    <div class="vote-status" id="voteStatus">You haven't voted yet</div>
  </div>
  
  <div class="input-bar">
    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { auth, db, getUserData } from './firebase-config.js';
import { signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// State
let currentUser = null;
let currentUsername = '';
let hasVoted = false;

// Listen to auth state
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  
  currentUser = user;
  const userData = await getUserData(user.uid);
  currentUsername = userData?.username || 'User';
  document.querySelector('.header-title span').textContent = `(${currentUsername})`;
  
  // Load chat
  loadChat();
});

// LOGOUT
window.logout = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
};

// CHAT
function loadChat() {
  const q = query(
    collection(db, 'messages'),
    orderBy('timestamp', 'asc')
  );
  
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById('chatContainer');
    // Clear only old messages (keep welcome)
    container.innerHTML = '<p style="color:#666; text-align:center; font-size:12px;">Welcome to Reality Check! Chat and vote below.</p>';
    
    snapshot.forEach((doc) => {
      const msg = doc.data();
      addMessageToChat(msg.username, msg.text, msg.timestamp, msg.userId === currentUser.uid);
    });
    
    // Scroll to bottom
    container.scrollTop = container.scrollHeight;
  });
}

function addMessageToChat(username, text, timestamp, isMe) {
  const container = document.getElementById('chatContainer');
  const p = document.createElement('p');
  
  const time = timestamp?.toDate ? timestamp.toDate().toLocaleTimeString() : '';
  const colorClass = isMe ? 'me' : ['user-a','user-b','user-c'][Math.floor(Math.random() * 3)];
  
  p.innerHTML = `
    <span class="username ${colorClass}">${isMe ? 'You' : username}:</span>
    ${text}
    <span class="timestamp">${time}</span>
  `;
  container.appendChild(p);
}

window.sendMessage = async function() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  
  await addDoc(collection(db, 'messages'), {
    userId: currentUser.uid,
    username: currentUsername,
    text: text,
    timestamp: new Date(),
    room: 'reality_check_room'
  });
  
  input.value = '';
};

// VOTING
window.castVote = async function(vote) {
  if (hasVoted) {
    document.getElementById('voteStatus').textContent = 'You already voted!';
    return;
  }
  if (!currentUser) return;
  
  try {
    // Save vote to user's history
    const userRef = doc(db, 'users', currentUser.uid);
    await updateDoc(userRef, {
      totalVotes: arrayUnion({
        vote: vote,
        timestamp: new Date(),
        room: 'reality_check_room'
      })
    });
    
    // Update stats count
    await updateDoc(userRef, {
      totalVotesCount: (await getUserData(currentUser.uid)).totalVotesCount + 1 || 1
    });
    
    hasVoted = true;
    document.getElementById('voteStatus').textContent = `✅ You voted: ${vote}`;
    
    // Disable buttons visually
    document.querySelectorAll('.btn-vote').forEach(btn => {
      btn.style.opacity = '0.5';
      btn.style.cursor = 'default';
    });
    
  } catch (error) {
    console.error('Vote error:', error);
    document.getElementById('voteStatus').textContent = '❌ Error saving vote';
  }
};

// Demo: Simulate an image (replace with real upload later)
setTimeout(() => {
  const box = document.getElementById('imageBox');
  box.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="font-size:48px;">☁️</div>
      <span style="font-size:14px; color:#aaa;">Strange Cloud Photo</span>
      <span style="font-size:11px; color:#555;">Uploaded by User_A</span>
    </div>
  `;
}, 500);

</script>
</body>
</html>
