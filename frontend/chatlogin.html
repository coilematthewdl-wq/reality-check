<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { 
    background: #1a1a1a; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0; 
  }
  
  .login-card {
    width: 400px;
    background: #2d2d2d;
    border-radius: 16px;
    border: 1px solid #444;
    padding: 40px 32px;
    color: #eee;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  .logo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #6ecbf5;
  }
  
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  
  .form-group {
    margin-bottom: 20px;
  }
  
  .form-group label {
    display: block;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 6px;
  }
  
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #eee;
    font-size: 16px;
    outline: none;
    transition: 0.2s;
  }
  
  .form-group input:focus {
    border-color: #6ecbf5;
  }
  
  .login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #4a90d9;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 8px;
  }
  
  .login-btn:hover {
    background: #357abd;
  }
  
  .signup-link {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #888;
  }
  
  .signup-link a {
    color: #6ecbf5;
    text-decoration: none;
  }
  
  .signup-link a:hover {
    text-decoration: underline;
  }
  
  .error-msg {
    background: #c62828;
    color: white;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    display: none;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">🎭 Reality Check</div>
  <div class="subtitle">Enter the room and vote on the truth</div>
  
  <div class="error-msg" id="errorMsg">Invalid credentials</div>
  
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" required>
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    
    <button type="submit" class="login-btn">Log In</button>
  </form>
  
  <div class="signup-link">
  Don't have an account? 
  <span 
    style="color: #007bff; cursor: pointer; text-decoration: underline;" 
    onclick="window.location.assign('/signup.html')">
    Sign up
  </span>


<script>
  function handleLogin(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    
    // Simple validation (replace with real auth later)
    if (username === '' || password === '') {
      errorMsg.textContent = 'Please fill in all fields';
      errorMsg.style.display = 'block';
      return;
    }
    
    const accounts = JSON.parse(localStorage.getItem('reality-check-accounts') || '[]');
    const account = accounts.find(user => user.username === username && user.password === password);
    
    if (account) {
      errorMsg.style.display = 'none';
      localStorage.setItem('reality-check-current-user', JSON.stringify({ name: account.name, username: account.username }));
      localStorage.setItem('reality-chat-username', account.name);
      window.location.href = 'Chatproto.html';
    } else {
      errorMsg.textContent = 'Invalid username or password';
      errorMsg.style.display = 'block';
    }
  }
</script>

</body>
</html>
